<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Red star -->
  <polygon
    points="100,10 125,66 186,72 140,113 153,173 100,142 47,173 60,113 14,72 75,66"
    fill="#C8102E"
    stroke="#071D49"
    stroke-width="8"
    stroke-linejoin="round"
    filter="url(#shadow)"
  />

  <!-- Navy segment lines from center to each inner vertex -->
  <line x1="100" y1="100" x2="125" y2="66"  stroke="#071D49" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="140" y2="113" stroke="#071D49" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="100" y2="142" stroke="#071D49" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="60"  y2="113" stroke="#071D49" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="75"  y2="66"  stroke="#071D49" stroke-width="4" stroke-linecap="round"/>

  <!-- SS lettering -->
  <text
    x="100"
    y="119"
    font-family="Impact, 'Arial Black', Arial, sans-serif"
    font-size="64"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    stroke="#071D49"
    stroke-width="5"
    paint-order="stroke fill"
    letter-spacing="-3"
  >SS</text>
</svg>
